
spring.application.name=hobbybuddy-platform

# Server port (Render injects PORT env var)
server.port=${PORT:8080}

# MySQL database configuration (env vars for cloud, fallback for local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hobbybuddy_db?createDatabaseIfNotExist=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sparks_0022}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.thymeleaf.cache=false

# FastAPI URL (env var for cloud, fallback for local)
fastapi.url=${FASTAPI_URL:http://localhost:8001}

# Server error details
server.error.include-message=always
server.error.include-stacktrace=always