<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" th:href="@{/manifest.json}">
    <link rel="apple-touch-icon" th:href="@{/images/icon-192.png}">
    <title>HobbyBuddy - Join Now</title>
    <link rel="stylesheet" th:href="@{/css/hobbybuddy.css(v=10)}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
    <nav class="navbar navbar-solid">
        <div class="nav-container">
            <a th:href="@{/}" class="logo"><i class="fas fa-users"></i><span>HobbyBuddy</span></a>
            <ul class="nav-menu"><li><a th:href="@{/login}" class="cta-button">Sign In</a></li></ul>
        </div>
    </nav>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-icon" style="font-size: 3.5rem; color: var(--color-accent-violet); margin-bottom: 15px; text-shadow: var(--shadow-glow);"><i class="fas fa-user-astronaut"></i></div>
                <h2 class="auth-title" style="font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; color: var(--color-text-main);">Join the Community</h2>
                <p class="auth-subtitle" style="font-size: 1.05rem; color: var(--color-text-muted); margin-bottom: 30px;">Create your secure profile and unlock the personality test.</p>
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-name"><i class="fas fa-user"></i> Name</label>
                        <input type="text" id="reg-name" autocomplete="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="reg-email" autocomplete="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="reg-password" autocomplete="new-password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="btn-form-primary" id="btn-register">
                        Discover your personality <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                <div class="auth-footer">Already have an account? <a th:href="@{/login}">Sign in</a></div>
            </div>
        </div>
    </div>
    <!-- Google Translate Widget -->
    <div id="google_translate_element" style="position:fixed; bottom:20px; left:20px; z-index:9999;"></div>
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script th:src="@{/js/hobbybuddy.js(v=7)}"></script>
</body>
</html>
